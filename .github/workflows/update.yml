name: Auto-update crossword data

# Runs daily at 12:00 UTC (8 AM ET). Adjust the cron expression to change the time.
# You can also run it manually from the Actions tab.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the updater
        id: run
        run: |
          python3 scripts/update_data.py | tee /tmp/updater.out
          grep -E "^HAS_CHANGES=" /tmp/updater.out >> "$GITHUB_OUTPUT" || echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"

      - name: Commit and push if there are new puzzles
        if: steps.run.outputs.HAS_CHANGES == 'true'
        run: |
          git config user.name  "nsw-archive-bot"
          git config user.email "[email protected]"
          git add data.json
          git commit -m "chore(data): auto-update crossword archive [skip ci]"
          git push

      - name: Refresh timestamp on no-change days (optional)
        if: steps.run.outputs.HAS_CHANGES != 'true'
        run: |
          git config user.name  "nsw-archive-bot"
          git config user.email "[email protected]"
          if ! git diff --quiet data.json; then
            git add data.json
            git commit -m "chore(data): refresh timestamp [skip ci]"
            git push
          else
            echo "No data changes to commit."
          fi
